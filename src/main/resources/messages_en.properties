# VERIFICATION AND CODES
# ============================================
auth.verify.already_verified=The account or channel is already verified. This action is not necessary.
auth.verify.phone_missing=There is no phone number associated with this account. Please update your contact information.
auth.verify.no_code_pending=No pending verification code was found for this channel. Please request a new code.
auth.verify.code_expired=The verification code has expired. Please request a new one.
auth.verify.invalid_code=The entered code is incorrect. Please verify the code and try again.
auth.verification.invalid_code=The entered verification code is incorrect. Please verify the code and try again.
