# ============================================
auth.login.invalid_credentials=The provided credentials are incorrect. Please verify your username and password.
auth.login.invalid=The provided credentials are incorrect.
auth.login.blocked=Your account has been temporarily locked due to multiple failed attempts. Please wait a few minutes or request an unlock code.
auth.login.disabled=Your account is disabled. Please contact support for more information.
auth.login.too_many_attempts=Too many failed attempts. Your account has been temporarily locked for security.

# ============================================
