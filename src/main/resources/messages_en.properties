auth.mfa.invalid_deactivation_code=The deactivation code is incorrect. Please verify the code and try again.
auth.mfa.already_disabled=Two-factor authentication is already disabled for this account.
auth.mfa.already_enabled=Two-factor authentication is already enabled for this account.
auth.mfa.setup_required=You must set up two-factor authentication before you can use it.
auth.mfa.invalid_strategy=The provided two-factor authentication strategy is not valid.

