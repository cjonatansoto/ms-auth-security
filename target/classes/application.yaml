spring:
  application:
    name: ms-auth-security
    version: 0.0.1-SNAPSHOT
  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_DATABASE:db_ms_auth}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&characterEncoding=utf8
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      pool-name: ProviderHubPool
      maximum-pool-size: ${DB_POOL_MAX:10}
      minimum-idle: ${DB_POOL_MIN:5}
      idle-timeout: ${DB_POOL_IDLE_TIMEOUT_MS:300000}
      connection-timeout: ${DB_POOL_CONN_TIMEOUT_MS:20000}
      max-lifetime: ${DB_POOL_MAX_LIFETIME_MS:1200000}

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
    show-sql: false

server:
  port: 9750
  forward-headers-strategy: framework

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  endpoint:
    health:
      show-details: always
  info:
    env:
      enabled: true

info:
  app:
    name: ${spring.application.name}
    description: "Authentication and authorization microservice for identity, session and access management."
  service: "Auth microservice responsible for user registration, login, token rotation, session control and role-based access."
  application:
    capabilities: "Spring Security, JWT, rotating refresh tokens, RBAC, ABAC, OAuth2, public/admin APIs, Caffeine cache"
    description: "Identity and access management service"
    name: ${spring.application.name}
    version: ${spring.application.version:unknown}

# Swagger UI y api-docs. URLs relativas para que funcione tanto directo como vía gateway (prefijo).
springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    enabled: true
    config-url: "../v3/api-docs/swagger-config"
    url: "../v3/api-docs"

logging:
  level:
    root: INFO
    com.rocketpj.provider_hub: ${LOG_LEVEL:INFO}
    org.hibernate.SQL: ${HIBERNATE_SQL_LOG:OFF}
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: ${LOG_FILE:logs/ms-provider-hub.log}